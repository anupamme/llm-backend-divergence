repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff-format
        files: ^divergence/
      - id: ruff
        args: [--fix]
        files: ^divergence/
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy --strict divergence/
        language: system
        types: [python]
        files: ^divergence/
        pass_filenames: false
